# GoReleaser config for ChitHub — https://goreleaser.com
# Triggered by the GitHub Actions workflow on a pushed tag (e.g. v0.1.0).
version: 2

project_name: chithub

before:
  hooks:
    - go mod tidy

builds:
  # macOS is built WITH cgo so it gets the native WKWebView window (own Dock
  # icon, no Chrome). On the arm64 macOS runner, clang targets each arch via
  # -arch, which lets us cross-build the amd64 slice too.
  - id: chithub-darwin
    main: .
    binary: chithub
    goos: [darwin]
    goarch: [amd64, arm64]
    env:
      - CGO_ENABLED=1
      - 'CC=clang -arch {{ if eq .Arch "amd64" }}x86_64{{ else }}arm64{{ end }}'
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
  # Linux needs no cgo (it falls back to the browser; see nativewin_stub.go).
  - id: chithub-linux
    main: .
    binary: chithub
    goos: [linux]
    goarch: [amd64, arm64]
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}

# A single macOS universal binary (amd64 + arm64) used for the .app/.dmg too.
universal_binaries:
  - id: chithub
    ids: [chithub-darwin]
    replace: true

archives:
  - id: chithub
    ids: [chithub, chithub-linux]
    name_template: "chithub_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

# Homebrew tap: publishes a formula to github.com/<owner>/homebrew-tap so users
# can `brew install <owner>/tap/chithub`. Requires a HOMEBREW_TAP_TOKEN secret
# (a PAT with write access to that tap repo).
brews:
  - name: chithub
    # Auto-skip the tap push when HOMEBREW_TAP_TOKEN isn't set, so a release
    # still succeeds (binaries + .dmg) before you've created the tap repo.
    skip_upload: '{{ if .Env.HOMEBREW_TAP_TOKEN }}false{{ else }}true{{ end }}'
    repository:
      owner: "{{ .Env.GITHUB_REPOSITORY_OWNER }}"
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/{{ .Env.GITHUB_REPOSITORY }}"
    description: "Manage every git repo in a folder — commit, push, pull and review in one place."
    license: "MIT"
    install: |
      bin.install "chithub"
    test: |
      system "#{bin}/chithub", "-version"

release:
  draft: false
  prerelease: auto
  name_template: "ChitHub {{ .Version }}"
