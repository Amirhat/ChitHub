<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChitHub</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/svg+xml" href="logo.svg" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img class="logo" src="logo.svg" width="30" height="30" alt="ChitHub" />
      <div class="brand-text">
        <h1>ChitHub</h1>
        <div class="split collection">
          <button id="collectionBtn" class="collection-btn" title="Active collection — click to switch folders">
            <svg class="folder-ic" viewBox="0 0 16 16" width="13" height="13" aria-hidden="true">
              <path fill="currentColor" d="M1.75 2.5h3.69c.46 0 .9.18 1.23.5l.83.83h5.75c.97 0 1.75.78 1.75 1.75v6.42c0 .97-.78 1.75-1.75 1.75H1.75A1.75 1.75 0 0 1 0 12.5V4.25C0 3.28.78 2.5 1.75 2.5Z"/>
            </svg>
            <span id="collectionName">…</span>
            <span class="caret-dim">▾</span>
          </button>
          <div class="menu collection-menu" id="collectionMenu" hidden></div>
        </div>
      </div>
    </div>

    <div class="stats" id="stats"></div>

    <div class="global-actions">
      <div class="split">
        <button id="reviewBtn" class="btn accent" title="Step through repos that need a commit or push">▶ <span data-i18n="review">Review</span></button>
        <button id="reviewMenuBtn" class="btn accent caret" title="Review options">▾</button>
        <div class="menu" id="reviewMenu" hidden>
          <button data-mode="commit">Review commits &amp; pushes</button>
          <button data-mode="pull">Review pulls (one by one)</button>
        </div>
      </div>
      <button id="cloneBtn" class="btn ghost" title="Clone a repository into this folder">
        <span class="ic">＋</span> <span data-i18n="clone">Clone</span>
      </button>
      <button id="paletteBtn" class="btn ghost" title="Command palette (⌘K / Ctrl+K)" data-i18n="palette">⌘K</button>
      <button id="refreshBtn" class="btn ghost" title="Rescan all repositories (R)">
        <span class="ic">⟳</span> <span data-i18n="refresh">Refresh</span>
      </button>
      <button id="settingsBtn" class="btn ghost iconbtn" title="Settings">⚙</button>
      <button id="fetchAllBtn" class="btn" title="Fetch selected repos" data-i18n="fetch">Fetch</button>
      <div class="split">
        <button id="pullAllBtn" class="btn primary" data-i18n="pull">Pull</button>
        <button id="pullAllMenuBtn" class="btn primary caret" title="Pull options">▾</button>
        <div class="menu" id="pullAllMenu" hidden>
          <button data-mode="ff">Pull (fast-forward only)</button>
          <button data-mode="rebase">Pull --rebase</button>
          <button data-mode="merge">Pull (merge)</button>
        </div>
      </div>
      <div class="split">
        <button id="pushAllBtn" class="btn" data-i18n="push">Push</button>
        <button id="pushAllMenuBtn" class="btn caret" title="Push options">▾</button>
        <div class="menu" id="pushAllMenu" hidden>
          <button data-force="false">Push</button>
          <button data-force="true" class="danger-item">Force push (--force-with-lease)</button>
        </div>
      </div>
    </div>
  </header>

  <div class="toolbar">
    <label class="check selectall">
      <input type="checkbox" id="selectAll" /> <span id="selectCount">Select all</span>
    </label>
    <div class="filters" id="filters">
      <button class="chip active" data-filter="all" data-i18n="All">All</button>
      <button class="chip" data-filter="attention" data-i18n="Needs attention">Needs attention</button>
      <button class="chip" data-filter="behind" data-i18n="Behind">Behind</button>
      <button class="chip" data-filter="ahead" data-i18n="Ahead">Ahead</button>
      <button class="chip" data-filter="dirty" data-i18n="Dirty">Dirty</button>
    </div>
    <input type="search" id="search" class="search" placeholder="Filter by name…" />
  </div>

  <main id="repoList" class="repo-list"></main>

  <div id="emptyState" class="empty" hidden>
    <p>No git repositories found in this collection.</p>
    <button class="btn primary" onclick="addCollection()">Add a folder</button>
  </div>

  <!-- Detail drawer -->
  <div id="drawer" class="drawer" hidden>
    <div class="drawer-backdrop" onclick="closeDrawer()"></div>
    <aside class="drawer-panel" id="drawerPanel"></aside>
  </div>

  <!-- Clone modal -->
  <div id="cloneModal" class="modal" hidden>
    <div class="modal-backdrop"></div>
    <div class="modal-card">
      <h3>Clone repository</h3>
      <label class="field">
        <span>Repository URL</span>
        <input type="text" id="cloneUrl" placeholder="https://github.com/owner/repo.git" />
      </label>
      <label class="field">
        <span>Folder name <em>(optional)</em></span>
        <input type="text" id="cloneName" placeholder="defaults to repo name" />
      </label>
      <div class="modal-actions">
        <button id="cloneCancel" class="btn ghost">Cancel</button>
        <button id="cloneGo" class="btn primary">Clone</button>
      </div>
    </div>
  </div>

  <!-- Commit diff modal -->
  <div id="showModal" class="modal" hidden>
    <div class="modal-backdrop" onclick="closeShow()"></div>
    <div class="modal-card wide" id="showCard"></div>
  </div>

  <!-- Toast / activity log -->
  <div id="toasts" class="toasts"></div>

  <script src="app.js"></script>
</body>
</html>
